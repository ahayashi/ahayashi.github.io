name: ci
on:
  push:
    branches:
      - mkdocs

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - run: |
          curl -L https://raw.githubusercontent.com/diogo-fernan/academicons/refs/heads/main/tex/academicons.sty -o academicons.sty
          curl -L https://raw.githubusercontent.com/diogo-fernan/academicons/refs/heads/main/truetype/academicons.ttf -o academicons.ttf
          docker run --rm --entrypoint sh -v ${{ github.workspace }}:/data pandoc/extra:latest -c "
            ls /data/academicons.ttf /data/academicons.sty
            cd /data &&
            apk add --no-cache ttf-liberation fontconfig &&
            fc-cache -fv &&
            export TEXINPUTS=.:\$TEXINPUTS &&
            pandoc --toc docs/index_pandoc.md docs/education.md docs/professional_experience.md docs/professional_committees.md docs/publications.md --pdf-engine=xelatex -V mainfont=\"Liberation Sans\" -o docs/cv/Akihiro-CV-Auto.pdf
            "
      - run: |
          git pull
          git add docs/cv/Akihiro-CV-Auto.pdf
          git config --global user.name 'Akihiro Hayashi'
          git config --global user.email 'ahayashi@gatech.edu'
          git commit -am "Add auto-generated CV"
          git push
      - uses: actions/setup-python@v2
        with:
          python-version: 3.x
      - run: pip install mkdocs-material mkdocs-redirects
      - run: mkdocs gh-deploy --force --remote-branch master
